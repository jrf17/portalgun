name: Export profile workspace

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove git metadata
        run: rm -rf .git
      - uses: actions/upload-artifact@v4
        with:
          name: portalgun-profile-workspace
          path: .
          include-hidden-files: true
          retention-days: 1
