name: Publish profile feature

on:
  push:
    branches: [feature/profile-driven-terminal-env-v2]
    paths:
      - '.profile-payload/**'
      - '.github/workflows/publish-profile-feature.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/profile-driven-terminal-env-v2
          fetch-depth: 0

      - name: Reconstruct reviewed implementation
        shell: bash
        run: |
          set -euo pipefail
          cat .profile-payload/part* | base64 --decode > /tmp/profile-feature.tgz
          tar xzf /tmp/profile-feature.tgz -C .

          mkdir -p profiles/default/dotfiles/.config/kitty
          mkdir -p profiles/default/dotfiles/.config/zellij
          cp configs/zshrc profiles/default/dotfiles/.zshrc
          cp configs/tmux.conf profiles/default/dotfiles/.tmux.conf
          cp configs/kitty.conf profiles/default/dotfiles/.config/kitty/kitty.conf
          cp configs/starship.toml profiles/default/dotfiles/.config/starship.toml
          rsync -a --delete configs/zellij/ profiles/default/dotfiles/.config/zellij/

          chmod +x install.sh bin/portalgun tests/test_profiles.sh
          chmod +x components/*/*.sh

      - name: Validate implementation
        shell: bash
        run: |
          set -euo pipefail
          ./tests/test_profiles.sh
          ./install.sh --profile kali-default --validate-profile --non-interactive
          PORTALGUN_ROOT="$PWD" \
          PORTALGUN_LIB="$PWD/lib" \
          PORTALGUN_REPO_DIR="$PWD" \
          PORTALGUN_PROFILE_ROOT="$PWD/profiles" \
          PORTALGUN_COMPONENT_ROOT="$PWD/components" \
          PORTALGUN_REGISTRY=/tmp/portalgun-registry \
          PORTALGUN_LOG_DIR=/tmp/portalgun-log \
          PORTALGUN_WEB_DIR=/tmp/portalgun-web \
            bash bin/portalgun --profile joseph profile validate

      - name: Commit clean feature tree
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .profile-payload
          rm -f .github/workflows/publish-profile-feature.yml
          git config user.name "OpenAI"
          git config user.email "noreply@openai.com"
          git add -A
          git commit -m "feat: add profile-driven terminal environments"
          git push origin HEAD:feature/profile-driven-terminal-env-v2
