name: p3ta-tricks integration

on:
  push:
    branches:
      - feature/p3ta-tricks-offline-integration
  pull_request:
    paths:
      - '.github/workflows/p3ta-tricks-tests.yml'
      - 'bin/portalgun'
      - 'completion/_portalgun'
      - 'installers/portalgun_install.sh'
      - 'lib/doctor.sh'
      - 'lib/install_p3ta_tricks.sh'
      - 'lib/sync_web.sh'
      - 'tests/test_p3ta_tricks_*.sh'

permissions:
  contents: read

jobs:
  focused-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install test prerequisites
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq
      - name: Run policy tests
        run: bash tests/test_p3ta_tricks_policy.sh
      - name: Run transactional tests
        run: |
          set +e
          bash -x tests/test_p3ta_tricks_transaction.sh > transaction.log 2>&1
          rc=$?
          cat transaction.log
          printf '%s\n' "$rc" > transaction.rc
          exit "$rc"
      - name: Upload transactional test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p3ta-tricks-transaction-log
          path: |
            transaction.log
            transaction.rc
          if-no-files-found: error
      - name: Run integration contract tests
        run: bash tests/test_p3ta_tricks_integration.sh
