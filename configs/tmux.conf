# Tmux - Tokyo Night Theme

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0

bind r source-file ~/.tmux.conf \; display "Reloaded!"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D
bind -n S-Left previous-window
bind -n S-Right next-window
bind c new-window -c "#{pane_current_path}"
bind x kill-pane

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"

set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-yank"

set -g status on
set -g status-interval 1
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1a1b26,fg=#c0caf5"

set -g status-left-length 100
set -g status-left "#[fg=#15161e,bg=#7aa2f7,bold]  #S #[fg=#7aa2f7,bg=#1a1b26,nobold]"

set -g status-right-length 100
set -g status-right "#[fg=#414868,bg=#1a1b26]#[fg=#c0caf5,bg=#414868]  %H:%M #[fg=#7aa2f7,bg=#414868]#[fg=#15161e,bg=#7aa2f7,bold]  %d-%b "

set -g window-status-format "#[fg=#414868,bg=#1a1b26]#[fg=#c0caf5,bg=#414868] #I: #W #[fg=#414868,bg=#1a1b26]"
set -g window-status-current-format "#[fg=#bb9af7,bg=#1a1b26]#[fg=#15161e,bg=#bb9af7,bold] #I: #W #[fg=#bb9af7,bg=#1a1b26]"
set -g window-status-separator ""

set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "fg=#7dcfff,bg=#414868,bold"
setw -g mode-style "fg=#bb9af7,bg=#414868,bold"
setw -g clock-mode-colour "#7aa2f7"

run "~/.tmux/plugins/tpm/tpm"
