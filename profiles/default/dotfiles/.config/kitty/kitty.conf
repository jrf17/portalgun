# Kitty Configuration - Tokyo Night Theme

# Font
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size 12.0

# Cursor
cursor_shape block
cursor_blink_interval 0.5

# Window
window_padding_width 10
background_opacity 1.0
confirm_os_window_close 0

# Shell
shell /usr/bin/zsh

# Scrollback
scrollback_lines 10000

# URLs
url_style curly
open_url_with default

# Bell
enable_audio_bell no
visual_bell_duration 0.0

# Tab bar
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted

# Tokyo Night Theme
foreground              #c0caf5
background              #1a1b26
selection_foreground    #c0caf5
selection_background    #283457

# Cursor colors
cursor                  #c0caf5
cursor_text_color       #1a1b26

# URL underline color when hovering with mouse
url_color               #73daca

# Kitty window border colors
active_border_color     #7aa2f7
inactive_border_color   #414868
bell_border_color       #e0af68

# Tab bar colors
active_tab_foreground   #1a1b26
active_tab_background   #7aa2f7
inactive_tab_foreground #545c7e
inactive_tab_background #16161e
tab_bar_background      #101014

# Marks
mark1_foreground #1a1b26
mark1_background #7aa2f7
mark2_foreground #1a1b26
mark2_background #bb9af7
mark3_foreground #1a1b26
mark3_background #73daca

# The 16 terminal colors

# black
color0  #15161e
color8  #414868

# red
color1  #f7768e
color9  #f7768e

# green
color2  #9ece6a
color10 #9ece6a

# yellow
color3  #e0af68
color11 #e0af68

# blue
color4  #7aa2f7
color12 #7aa2f7

# magenta
color5  #bb9af7
color13 #bb9af7

# cyan
color6  #7dcfff
color14 #7dcfff

# white
color7  #a9b1d6
color15 #c0caf5
