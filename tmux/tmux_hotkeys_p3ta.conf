# ═══════════════════════════════════════════════════════════════════
# Tmux Configuration - p3ta Hotkeys
# Catppuccin Mocha Theme
# ═══════════════════════════════════════════════════════════════════

# General Settings
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on
set -g set-clipboard on

# ───────────────────────────────────────────────────────────────────
# Key Bindings - p3ta style
# ───────────────────────────────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt + h/j/k/l to switch panes (no prefix)
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# Shift + arrow to switch windows
bind -n S-Left previous-window
bind -n S-Right next-window

# Resize panes with Prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window management
bind c new-window -c "#{pane_current_path}"
bind x kill-pane
bind X kill-window

# ───────────────────────────────────────────────────────────────────
# Copy Mode (vi keys)
# ───────────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"

# ───────────────────────────────────────────────────────────────────
# Catppuccin Mocha Theme
# ───────────────────────────────────────────────────────────────────
thm_bg="#1e1e2e"
thm_fg="#cdd6f4"
thm_black="#181825"
thm_gray="#313244"
thm_blue="#89b4fa"
thm_magenta="#cba6f7"
thm_cyan="#89dceb"

set -g status on
set -g status-interval 1
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=${thm_bg},fg=${thm_fg}"

set -g status-left-length 100
set -g status-left "#[fg=${thm_black},bg=${thm_blue},bold]  #S #[fg=${thm_blue},bg=${thm_bg},nobold]#[default] "

set -g status-right-length 100
set -g status-right "#[fg=${thm_gray},bg=${thm_bg}]#[fg=${thm_fg},bg=${thm_gray}]  %H:%M #[fg=${thm_blue}]#[fg=${thm_black},bg=${thm_blue},bold]  %d-%b "

set -g window-status-format "#[fg=${thm_gray},bg=${thm_bg}]#[fg=${thm_fg},bg=${thm_gray}] #I: #W #[fg=${thm_gray},bg=${thm_bg}]"
set -g window-status-current-format "#[fg=${thm_magenta},bg=${thm_bg}]#[fg=${thm_black},bg=${thm_magenta},bold] #I: #W #[fg=${thm_magenta},bg=${thm_bg}]"
set -g window-status-separator ""

set -g pane-border-style "fg=${thm_gray}"
set -g pane-active-border-style "fg=${thm_blue}"
set -g message-style "fg=${thm_cyan},bg=${thm_gray},bold"
setw -g mode-style "fg=${thm_magenta},bg=${thm_gray},bold"
setw -g clock-mode-colour "${thm_blue}"

# ═══════════════════════════════════════════════════════════════════
# TPM - Tmux Plugin Manager
# ═══════════════════════════════════════════════════════════════════
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
