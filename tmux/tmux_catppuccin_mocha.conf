# Tmux - Catppuccin Mocha (egel-style standalone)

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on
set -g set-clipboard on

bind r source-file ~/.tmux.conf \; display "Reloaded!"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D
bind -n S-Left previous-window
bind -n S-Right next-window
bind c new-window -c "#{pane_current_path}"
bind x kill-pane

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"

set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-yank"

# === Catppuccin Mocha — egel-style standalone ===

set -g status "on"
set -g status-position bottom
set -g status-justify "left"
set -g status-interval 1
set -g status-style "none,bg=#1e1e2e"

set -g status-left-style "none"
set -g status-left-length "100"
set -g status-left "#[fg=#1e1e2e,bg=#cba6f7,bold] #S #[fg=#cba6f7,bg=#1e1e2e,nobold,nounderscore,noitalics]"

set -g status-right-style "none"
set -g status-right-length "100"
set -g status-right "#[fg=#45475a,bg=#1e1e2e,nobold,nounderscore,noitalics]#[fg=#cdd6f4,bg=#45475a] %Y-%m-%d  %H:%M #[fg=#cba6f7,bg=#45475a,nobold,nounderscore,noitalics]#[fg=#1e1e2e,bg=#cba6f7,bold] #h "

setw -g window-status-activity-style "underscore,fg=#bac2de,bg=#1e1e2e"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#bac2de,bg=#1e1e2e"
setw -g window-status-format "#[fg=#1e1e2e,bg=#1e1e2e,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#1e1e2e,bg=#1e1e2e,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#45475a,nobold,nounderscore,noitalics]#[fg=#cdd6f4,bg=#45475a] #I  #W #F #[fg=#45475a,bg=#1e1e2e,nobold,nounderscore,noitalics]"

set -g pane-active-border-style "fg=#cba6f7"
set -g pane-border-style "fg=#45475a"

set -g message-style "fg=#cba6f7,bg=#45475a"
set -g message-command-style "fg=#cba6f7,bg=#45475a"
setw -g mode-style "fg=#f5c2e7,bg=#45475a,bold"

run "~/.tmux/plugins/tpm/tpm"
