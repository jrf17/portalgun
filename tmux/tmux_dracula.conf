# Tmux - Dracula (egel-style standalone with powerline)

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on
set -g set-clipboard on

bind r source-file ~/.tmux.conf \; display "Reloaded!"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D
bind -n S-Left previous-window
bind -n S-Right next-window
bind c new-window -c "#{pane_current_path}"
bind x kill-pane

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"

set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-yank"

# === Dracula — egel-style with powerline arrows ===

set -g status "on"
set -g status-position bottom
set -g status-justify "left"
set -g status-interval 1
set -g status-style "none,bg=#282a36"

# Left: [ session ]> [ user@host ]>
set -g status-left-style "none"
set -g status-left-length "100"
set -g status-left "#[fg=#282a36,bg=#bd93f9,bold] #S #[fg=#bd93f9,bg=#44475a,nobold,nounderscore,noitalics]#[fg=#f8f8f2,bg=#44475a] #(whoami)@#h #[fg=#44475a,bg=#282a36,nobold,nounderscore,noitalics]"

# Right: <[ datetime ] <[ host ]
set -g status-right-style "none"
set -g status-right-length "100"
set -g status-right "#[fg=#44475a,bg=#282a36,nobold,nounderscore,noitalics]#[fg=#f8f8f2,bg=#44475a] %Y-%m-%d  %H:%M #[fg=#bd93f9,bg=#44475a,nobold,nounderscore,noitalics]#[fg=#282a36,bg=#bd93f9,bold] #h "

# Windows
setw -g window-status-activity-style "underscore,fg=#f8f8f2,bg=#282a36"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#f8f8f2,bg=#282a36"
setw -g window-status-format " #I  #W "
setw -g window-status-current-format "#[fg=#282a36,bg=#44475a,nobold,nounderscore,noitalics]#[fg=#f8f8f2,bg=#44475a] #I  #W #[fg=#44475a,bg=#282a36,nobold,nounderscore,noitalics]"

# Panes
set -g pane-active-border-style "fg=#bd93f9"
set -g pane-border-style "fg=#44475a"

# Messages
set -g message-style "fg=#bd93f9,bg=#44475a"
set -g message-command-style "fg=#bd93f9,bg=#44475a"
setw -g mode-style "fg=#ff79c6,bg=#44475a,bold"

run "~/.tmux/plugins/tpm/tpm"
