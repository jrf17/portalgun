# ═══════════════════════════════════════════════════════════════════
# Tmux Configuration - Default Hotkeys
# Standard tmux keybindings
# ═══════════════════════════════════════════════════════════════════

# General Settings
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0

# ───────────────────────────────────────────────────────────────────
# Default Key Bindings (standard tmux)
# ───────────────────────────────────────────────────────────────────
# Prefix is Ctrl+b (default)

# Split panes: " for horizontal, % for vertical
# bind " split-window
# bind % split-window -h

# Navigate panes: arrow keys
# bind Up select-pane -U
# bind Down select-pane -D
# bind Left select-pane -L
# bind Right select-pane -R

# Window management
# c = new window
# & = kill window
# n = next window
# p = previous window
# , = rename window

# Other
# [ = copy mode
# d = detach
# s = choose session
# : = command prompt

# ───────────────────────────────────────────────────────────────────
# Copy Mode
# ───────────────────────────────────────────────────────────────────
setw -g mode-keys vi

# ───────────────────────────────────────────────────────────────────
# Default Theme (minimal)
# ───────────────────────────────────────────────────────────────────
set -g status on
set -g status-interval 1
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour136"

set -g status-left-length 40
set -g status-left "#[fg=colour148,bold] #S #[fg=colour245]| "

set -g status-right-length 60
set -g status-right "#[fg=colour245]%H:%M #[fg=colour148]%d-%b-%Y "

set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour81,bold] #I:#W "

set -g pane-border-style "fg=colour235"
set -g pane-active-border-style "fg=colour148"
set -g message-style "fg=colour166,bg=colour235,bold"

# ═══════════════════════════════════════════════════════════════════
# TPM - Tmux Plugin Manager
# ═══════════════════════════════════════════════════════════════════
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

run '~/.tmux/plugins/tpm/tpm'
